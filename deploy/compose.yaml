services:
  unobot:
    image: ${UNO_IMAGE:?set UNO_IMAGE to an immutable sha256 image ID or RepoDigest}
    platform: linux/amd64
    restart: on-failure:3
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: ${UNO_MEMORY_LIMIT:-1g}
    cpus: ${UNO_CPU_LIMIT:-2.0}
    stop_grace_period: 20s
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,mode=1777
      - /run/unobot:rw,noexec,nosuid,nodev,size=1m,mode=0700,uid=10001,gid=10001
    volumes:
      - type: bind
        source: ${UNO_CHECKPOINT:?set UNO_CHECKPOINT to an absolute checkpoint path}
        target: /models/jedna_multiplayer_v3.zip
        read_only: true
        bind:
          create_host_path: false
      - unobot-logs:/unobot/logs
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
    environment:
      TZ: ${TZ:-Europe/Berlin}
      IRC_SERVER: ${IRC_SERVER:?set IRC_SERVER}
      IRC_PORT: ${IRC_PORT:-6667}
      IRC_NICK: ${IRC_NICK:-unobot}
      UNO_RUNTIME: v2
      UNO_MESSAGING: ${UNO_MESSAGING:-machine}
      UNO_STRATEGY: ${UNO_STRATEGY:-simple}
      UNO_SHADOW_STRATEGY: ${UNO_SHADOW_STRATEGY:-neural}
      UNO_MACHINE_HUMAN_FALLBACK: ${UNO_MACHINE_HUMAN_FALLBACK:-false}
      UNO_AUTOJOIN: ${UNO_AUTOJOIN:-false}
      UNO_CHANNELS: ${UNO_CHANNELS:?set UNO_CHANNELS}
      UNO_HOST_NICKS: ${UNO_HOST_NICKS:?set UNO_HOST_NICKS}
      UNO_ADMIN_NICKS: ${UNO_ADMIN_NICKS:?set UNO_ADMIN_NICKS}
      UNO_NEURAL_CHECKPOINT_SHA256: ${UNO_NEURAL_CHECKPOINT_SHA256:-716e687a637632e286e0050b1e013ded46af95033bf5a45901163cc0c141aa15}
      UNO_NEURAL_STOCHASTIC: ${UNO_NEURAL_STOCHASTIC:-false}
      UNO_OPERATIONS_SOCKET: /run/unobot/control.sock
      OMP_NUM_THREADS: ${UNO_TORCH_THREADS:-1}
      MKL_NUM_THREADS: ${UNO_TORCH_THREADS:-1}
      OPENBLAS_NUM_THREADS: ${UNO_TORCH_THREADS:-1}
    healthcheck:
      test: ["CMD", "/unobot/bin/unobotctl", "health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  unobot-logs:
